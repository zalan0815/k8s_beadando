<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Oscar nyertesek</title>

<style>
/* 🌌 háttér */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
}

/* 🧊 fő kártya */
.card {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 20px;
  width: 380px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  animation: float 4s ease-in-out infinite;
}

/* ✨ lebegés */
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 🎬 cím */
h1 {
  font-size: 22px;
  margin-bottom: 20px;
  background: linear-gradient(90deg, #ffcc70, #ff6a00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 📅 select */
select {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 16px;
  margin-top: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

select:hover {
  background: rgba(255,255,255,0.2);
}

/* 🏆 eredmény */
#result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
  min-height: 30px;
  transition: 0.3s;
}

/* ✨ glow effekt */
.glow {
  color: #ffd700;
  text-shadow: 0 0 10px #ffd700, 0 0 20px #ffb300;
}
</style>

</head>

<body>

<div class="card">
  <h1>🏆 Oscar díj nyertesek</h1>

  <select id="yearSelect">
    <option value="">Válassz évet</option>
    <option value="2020">2020</option>
    <option value="2021">2021</option>
    <option value="2022">2022</option>
    <option value="2023">2023</option>
    <option value="2024">2024</option>
    <option value="2025">2025</option>
  </select>

  <p id="result"></p>
</div>

<script>
const select = document.getElementById("yearSelect");
const result = document.getElementById("result");

select.addEventListener("change", async () => {
  const year = select.value;

  if (!year) return;

  result.innerText = "Betöltés... ⏳";
  result.classList.remove("glow");

  try {
    const res = await fetch(`http://api-k8s-beadando-tofalvizalan.jcloud.jedlik.cloud/oscar/${year}`);
    const data = await res.json();

    if (data.error) {
      result.innerText = data.error;
    } else {
      result.innerHTML = `${data.year} nyertese:<br><span class="glow">${data.winner}</span>`;
    }
  } catch (err) {
    result.innerText = "Hiba a szerverrel 😢";
  }
});
</script>

</body>
</html>
