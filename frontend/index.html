<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Oscar nyertesek</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
}

/* 🌌 card */
.card {
  width: 380px;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  box-shadow: 0 0 40px rgba(0,0,0,0.7);
  text-align: center;
  animation: float 5s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 🏆 title */
h1 {
  font-size: 22px;
  margin-bottom: 20px;
  background: linear-gradient(90deg,#ffcc70,#ff6a00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 🎛️ CUSTOM DROPDOWN */
.dropdown {
  position: relative;
  margin-top: 15px;
}

.dropdown-btn {
  padding: 12px;
  border-radius: 12px;
  background: rgba(20,20,30,0.7);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: 0.3s;
}

.dropdown-btn:hover {
  background: rgba(40,40,60,0.8);
}

.dropdown-list {
  position: absolute;
  top: 50px;
  left: 0;
  right: 0;
  background: #1a1a2e;
  border-radius: 12px;
  overflow: hidden;
  display: none;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  z-index: 10;
}

.dropdown-list div {
  padding: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.dropdown-list div:hover {
  background: #ff6a00;
  color: black;
}

/* 🏆 result */
#result {
  margin-top: 20px;
  font-size: 18px;
  min-height: 40px;
}

.glow {
  color: #ffd700;
  text-shadow: 0 0 10px #ffd700, 0 0 25px #ffb300;
}

/* ⏳ loading */
.loading {
  color: #aaa;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.4; }
}
</style>

</head>

<body>

<div class="card">
  <h1>🏆 Oscar díj nyertesek</h1>

  <div class="dropdown">
    <div class="dropdown-btn" id="btn">Válassz évet ⬇</div>
    <div class="dropdown-list" id="list">
      <div data-year="2020">2020</div>
      <div data-year="2021">2021</div>
      <div data-year="2022">2022</div>
      <div data-year="2023">2023</div>
      <div data-year="2024">2024</div>
      <div data-year="2025">2025</div>
    </div>
  </div>

  <p id="result"></p>
</div>

<script>
const btn = document.getElementById("btn");
const list = document.getElementById("list");
const result = document.getElementById("result");

btn.onclick = () => {
  list.style.display = list.style.display === "block" ? "none" : "block";
};

document.querySelectorAll(".dropdown-list div").forEach(el => {
  el.addEventListener("click", async () => {
    const year = el.dataset.year;

    btn.innerText = year;
    list.style.display = "none";

    result.innerHTML = "Betöltés... ⏳";
    result.classList.add("loading");

    try {
      const res = await fetch(`http://api-k8s-beadando-tofalvizalan.jcloud.jedlik.cloud/oscar/${year}`);
      const data = await res.json();

      result.classList.remove("loading");

      if (data.error) {
        result.innerText = data.error;
      } else {
        result.innerHTML = `
          ${data.year} nyertese:<br>
          <span class="glow">${data.winner}</span>
        `;
      }

    } catch (e) {
      result.innerText = "Hiba a szerverrel 😢";
    }
  });
});

// click outside close
document.addEventListener("click", (e) => {
  if (!e.target.closest(".dropdown")) {
    list.style.display = "none";
  }
});
</script>

</body>
</html>
